<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>kick — soccer striking tutorial</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0d1b12; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      /* CSS2D annotation labels pinned to 3D points */
      .annotation {
        font: 600 13px/1.2 system-ui, sans-serif;
        color: #eafff0;
        background: rgba(8, 26, 16, 0.82);
        border: 1px solid rgba(120, 230, 160, 0.55);
        border-radius: 6px;
        padding: 4px 8px;
        white-space: nowrap;
        transform: translate(-50%, -120%);
        pointer-events: none;
        text-shadow: 0 1px 2px rgba(0,0,0,0.6);
      }
      .annotation .val { color: #8ff0b6; }

      #title {
        position: fixed; top: 14px; left: 16px; z-index: 5;
        font: 700 15px system-ui, sans-serif; color: #cdeed8;
        text-shadow: 0 1px 3px rgba(0,0,0,0.7); pointer-events: none;
      }
      #title small { display:block; font-weight: 500; font-size: 11px; color:#7fae90; }

      #loading {
        position: fixed; inset: 0; display: grid; place-items: center; z-index: 10;
        font: 600 14px system-ui, sans-serif; color: #bfe9cd;
        background: #0d1b12; transition: opacity .4s; pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="title">kick<small>soccer striking — tune the parameters</small></div>
    <div id="loading">Loading character…</div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
