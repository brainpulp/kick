<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>kick — soccer striking tutorial</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; overflow: hidden; background: #0d1b12; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      /* CSS2D annotation labels pinned to 3D points */
      .annotation {
        font: 600 13px/1.2 system-ui, sans-serif;
        color: #eafff0;
        background: rgba(8, 26, 16, 0.82);
        border: 1px solid rgba(120, 230, 160, 0.55);
        border-radius: 6px;
        padding: 4px 8px;
        white-space: nowrap;
        transform: translate(-50%, -120%);
        pointer-events: none;
        text-shadow: 0 1px 2px rgba(0,0,0,0.6);
      }
      .annotation .val { color: #8ff0b6; }

      #title {
        position: fixed; top: 14px; left: 16px; z-index: 5;
        font: 700 15px system-ui, sans-serif; color: #cdeed8;
        text-shadow: 0 1px 3px rgba(0,0,0,0.7); pointer-events: none;
      }
      #title small { display:block; font-weight: 500; font-size: 11px; color:#7fae90; }

      #loading {
        position: fixed; inset: 0; display: grid; place-items: center; z-index: 10;
        font: 600 14px system-ui, sans-serif; color: #bfe9cd;
        background: #0d1b12; transition: opacity .4s; pointer-events: none;
      }

      #build {
        position: fixed; bottom: 8px; left: 10px; z-index: 5;
        font: 500 11px ui-monospace, monospace; color: #5f9472;
        text-shadow: 0 1px 2px rgba(0,0,0,0.7); pointer-events: none;
      }

      /* Keyframe timeline */
      #timeline {
        position: fixed; left: 12px; right: 320px; bottom: 26px; z-index: 6;
        display: flex; align-items: center; gap: 8px;
        font: 600 11px system-ui, sans-serif;
      }
      #timeline .tl-btn {
        flex: 0 0 auto; width: 26px; height: 26px; border-radius: 5px;
        background: rgba(8,26,16,0.9); color: #cdeed8;
        border: 1px solid rgba(120,230,160,0.4); cursor: pointer;
      }
      #timeline .tl-btn:hover { border-color: #8ff0b6; }
      .tl-track {
        position: relative; flex: 1 1 auto; height: 34px;
        background: rgba(8,26,16,0.72); border: 1px solid rgba(120,230,160,0.28);
        border-radius: 6px;
      }
      .tl-playhead {
        position: absolute; top: -2px; bottom: -2px; width: 2px; left: 0;
        background: #ffcc33; box-shadow: 0 0 4px #ffcc33; pointer-events: none;
      }
      .tl-key {
        position: absolute; top: 0; transform: translateX(-50%);
        height: 34px; padding: 0; background: none; border: none; cursor: pointer;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
      }
      .tl-dot {
        width: 11px; height: 11px; border-radius: 50%;
        background: #2f6b3a; border: 2px solid #6fe0a0;
      }
      .tl-key:hover .tl-dot { background: #6fe0a0; }
      .tl-key.active .tl-dot { background: #ffcc33; border-color: #ffcc33; }
      .tl-lbl {
        margin-top: 2px; color: #9fd9b3; white-space: nowrap; font-size: 9px;
        opacity: 0.0; transition: opacity .12s;
      }
      .tl-key:hover .tl-lbl, .tl-key.active .tl-lbl { opacity: 1; color: #eafff0; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="title">kick<small>soccer striking — tune the parameters</small></div>
    <div id="loading">Loading character…</div>
    <div id="build"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
